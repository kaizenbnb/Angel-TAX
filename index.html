<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://api.coingecko.com; img-src 'self' data: blob:; object-src 'none'; base-uri 'self'"/>
  <title>Angel Tax — Fiscalidad Cripto España</title>
  <meta name="description" content="La herramienta definitiva para la fiscalidad de criptomonedas en España. Open source, gratuita y 100% privada."/>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 5 L15 20 L15 60 Q15 85 50 95 Q85 85 85 60 L85 20 Z' fill='%231e3a6e' stroke='%236ab0f5' stroke-width='3'/%3E%3Cpath d='M50 5 L15 20 L15 60 Q15 85 50 95 Q32 85 32 60 L32 20 Z' fill='%232a5298' opacity='0.7'/%3E%3C/svg%3E"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#070a14;--sur:#0e1220;--sur2:#1a2235;--sur3:#1e2540;
      --bor:#2e3a5a;--bor2:#2e3a5e;
      --gold:#c9a227;--gold2:#e8c04a;--gg:rgba(201,162,39,.18);
      --text:#dde1f0;--dim:#a8b2cc;--mut:#6b789e;
      --green:#3dba7a;--gd:#0e3324;
      --red:#e05252;--rd:#3b1212;
      --blue:#4d82e8;--bd:#0f1f45;
      --orange:#e8943a;
    }
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    #app{max-width:1100px;margin:0 auto;padding:0 20px 80px}
    /* HEADER */
    .header{padding:28px 0 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bor);margin-bottom:28px;flex-wrap:wrap;gap:12px}
    .logo{display:flex;align-items:center;gap:14px}
    .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#e8c04a,#c9a227);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px var(--gg)}
    .logo h1{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold2);line-height:1.2}
    .logo span{font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
    .badge{background:var(--gd);border:1px solid var(--green);color:var(--green);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1px}
    /* NAV */
    .nav{display:flex;gap:4px;margin-bottom:28px;background:var(--sur);padding:6px;border-radius:12px;border:1px solid var(--bor);overflow-x:auto}
    .nav button{flex:1;min-width:fit-content;padding:9px 16px;border-radius:8px;border:none;background:transparent;color:var(--dim);font-family:'DM Sans',system-ui;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
    .nav button:hover{background:var(--sur2);color:var(--text)}
    .nav button.active{background:var(--sur3);color:var(--gold2);border:1px solid var(--bor2)}
    .nav .cnt{background:var(--gold2);color:#0a0c14;border-radius:10px;padding:0 6px;font-size:10px;font-weight:700;margin-left:4px}
    /* CARDS */
    .card{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:28px;margin-bottom:20px}
    .card-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-bottom:4px}
    .card-sub{font-size:13px;color:var(--dim)}
    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:28px}
    .stat{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:18px 20px}
    .stat-label{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .stat-value{font-size:22px;font-weight:700;font-family:'Playfair Display',serif}
    .stat-sub{font-size:11px;color:var(--mut);margin-top:3px}
    /* FORM */
    .form-label{display:block;font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
    .form-input{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;color:var(--text);padding:11px 14px;font-family:'DM Sans',system-ui;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
    .form-input:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gg)}
    .form-hint{font-size:11px;color:var(--mut);margin-top:5px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
    .form-group{margin-bottom:16px}
    /* BUTTONS */
    .btn-primary{padding:11px 22px;border-radius:8px;border:none;background:linear-gradient(135deg,#c9a227,#e8c04a);color:#0a0c14;font-family:'DM Sans',system-ui;font-size:14px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--gg)}
    .btn-sec{padding:11px 22px;border-radius:8px;border:1px solid var(--bor2);background:var(--sur2);color:var(--text);font-family:'DM Sans',system-ui;font-size:14px;font-weight:600;cursor:pointer}
    .btn-sec:hover{background:var(--sur3)}
    .btn-icon{background:none;border:none;cursor:pointer;color:var(--mut);font-size:16px;padding:4px 8px}
    .btn-icon:hover{color:var(--red)}
    /* ALERTS */
    .alert{padding:14px 18px;border-radius:12px;border-left:3px solid;margin-bottom:16px;font-size:13px;line-height:1.5;color:var(--text)}
    .alert-blue{background:var(--bd);border-color:var(--blue)}
    .alert-gold{background:#1a1408;border-color:var(--gold)}
    .alert-green{background:var(--gd);border-color:var(--green)}
    .alert-orange{background:#2a1a08;border-color:var(--orange)}
    .alert-red{background:var(--rd);border-color:var(--red)}
    /* OP GRID */
    .op-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-bottom:24px}
    .op-card{background:var(--sur2);border:1.5px solid var(--bor);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s}
    .op-card:hover{transform:translateY(-2px);border-color:var(--bor2);box-shadow:0 4px 20px rgba(0,0,0,.4)}
    /* CASILLA */
    .casilla{display:inline-block;background:var(--bd);color:var(--blue);border:1px solid var(--blue);border-radius:6px;padding:1px 8px;font-size:11px;font-weight:700;font-family:monospace}
    .casilla-gold{background:#1a1408;color:var(--gold2);border-color:var(--gold)}
    /* TABLE */
    table{width:100%;border-collapse:collapse}
    th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mut);padding:8px 12px;border-bottom:1px solid var(--bor);text-align:left}
    td{padding:11px 12px;border-bottom:1px solid var(--bor);font-size:13px}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--sur2)}
    .tr-active td{background:#1a1408!important;color:var(--gold2)}
    /* RESULT BOX */
    .result-box{background:var(--sur2);border:1px solid var(--bor2);border-radius:12px;padding:20px;margin:20px 0}
    .result-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bor);font-size:14px}
    .result-row:last-child{border-bottom:none;padding-top:14px;font-size:16px;font-weight:700}
    /* GUIDE */
    .guide-item{background:var(--sur2);border:1px solid var(--bor);border-radius:12px;margin-bottom:12px;overflow:hidden}
    .guide-header{padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
    .guide-body{padding:0 20px 20px;border-top:1px solid var(--bor);font-size:13px;color:var(--dim);line-height:1.6}
    .guide-body p{margin:12px 0}
    .guide-body ul{padding-left:18px;line-height:1.8}
    /* PRIVACY BAR */
    .privacy-bar{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bor);padding:10px 24px;display:flex;align-items:center;justify-content:center;gap:16px;font-size:12px;color:var(--dim);z-index:100;flex-wrap:wrap}
    .privacy-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
    /* EMPTY */
    .empty{text-align:center;padding:60px 20px}
    .empty-icon{font-size:72px;opacity:.2;margin-bottom:16px}
    /* COLORS */
    .c-gold{color:var(--gold2)} .c-green{color:var(--green)} .c-red{color:var(--red)} .c-blue{color:var(--blue)} .c-orange{color:var(--orange)} .c-dim{color:var(--dim)}
    .fw7{font-weight:700} .ff-serif{font-family:'Playfair Display',serif}
    select{background:var(--sur2);border:1px solid var(--bor);border-radius:8px;color:var(--text);padding:5px 10px;font-size:12px;font-family:'DM Sans',system-ui;outline:none}
    a{color:var(--blue)}
    /* ICONS */
    .icon{vertical-align:middle;width:16px;height:16px}
    .icon-large{vertical-align:middle;width:28px;height:28px}
    /* FOOTER */
    #footer{background:var(--sur);border-top:1px solid var(--bor);padding:24px;margin-top:60px;text-align:center;font-size:12px;color:var(--dim);line-height:1.6}
    #footer a{color:var(--blue);text-decoration:none}
    #footer a:hover{text-decoration:underline}
    @media(max-width:640px){.form-grid,.form-grid3{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<div id="app"></div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/feather-icons@4.29.2/dist/feather.min.js" integrity="sha384-qEqAs1VsN9WH2myXDbiP2wGGIttL9bMRZBKCl54ZnzpDlVqbYANP9vMaoT/wvQcf" crossorigin="anonymous" onload="if(window.feather) feather.replace()"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" integrity="sha512-r22gChDnGvBylk90+2e/ycr3RVrDi8DIOkIGNhJlKfuyQM4tIRAI062MaV8sfjQKYVGjOBaZBOA87z+IhZE9DA==" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha512-qZvrmS2ekKPF2mSznTQsxqPgnpkI4DNTlrdUmTzrDgektczlKNRRhy5X5AAOnx5S09ydFYWWNSfcEqDTTHgtNA==" crossorigin="anonymous"></script>
</body>
</html>
