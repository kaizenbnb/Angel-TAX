<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Angel Tax — Fiscalidad Cripto España</title>
  <meta name="description" content="La herramienta definitiva para la fiscalidad de criptomonedas en España. Open source, gratuita y 100% privada."/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#070a14;--sur:#0e1220;--sur2:#161c2e;--sur3:#1e2540;
      --bor:#252d4a;--bor2:#2e3a5e;
      --gold:#c9a227;--gold2:#e8c04a;--gg:rgba(201,162,39,.18);
      --text:#dde1f0;--dim:#7a85a8;--mut:#3d4a6e;
      --green:#3dba7a;--gd:#0e3324;
      --red:#e05252;--rd:#3b1212;
      --blue:#4d82e8;--bd:#0f1f45;
      --orange:#e8943a;
    }
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    #app{max-width:1100px;margin:0 auto;padding:0 20px 80px}
    /* HEADER */
    .header{padding:28px 0 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bor);margin-bottom:28px;flex-wrap:wrap;gap:12px}
    .logo{display:flex;align-items:center;gap:14px}
    .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#e8c04a,#c9a227);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px var(--gg)}
    .logo h1{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold2);line-height:1.2}
    .logo span{font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
    .badge{background:var(--gd);border:1px solid var(--green);color:var(--green);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1px}
    /* NAV */
    .nav{display:flex;gap:4px;margin-bottom:28px;background:var(--sur);padding:6px;border-radius:12px;border:1px solid var(--bor);overflow-x:auto}
    .nav button{flex:1;min-width:fit-content;padding:9px 16px;border-radius:8px;border:none;background:transparent;color:var(--dim);font-family:'DM Sans',system-ui;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
    .nav button:hover{background:var(--sur2);color:var(--text)}
    .nav button.active{background:var(--sur3);color:var(--gold2);border:1px solid var(--bor2)}
    .nav .cnt{background:var(--gold2);color:#0a0c14;border-radius:10px;padding:0 6px;font-size:10px;font-weight:700;margin-left:4px}
    /* CARDS */
    .card{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:28px;margin-bottom:20px}
    .card-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-bottom:4px}
    .card-sub{font-size:13px;color:var(--dim)}
    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:28px}
    .stat{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:18px 20px}
    .stat-label{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .stat-value{font-size:22px;font-weight:700;font-family:'Playfair Display',serif}
    .stat-sub{font-size:11px;color:var(--mut);margin-top:3px}
    /* FORM */
    .form-label{display:block;font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
    .form-input{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;color:var(--text);padding:11px 14px;font-family:'DM Sans',system-ui;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
    .form-input:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gg)}
    .form-hint{font-size:11px;color:var(--mut);margin-top:5px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
    .form-group{margin-bottom:16px}
    /* BUTTONS */
    .btn-primary{padding:11px 22px;border-radius:8px;border:none;background:linear-gradient(135deg,#c9a227,#e8c04a);color:#0a0c14;font-family:'DM Sans',system-ui;font-size:14px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--gg)}
    .btn-sec{padding:11px 22px;border-radius:8px;border:1px solid var(--bor2);background:var(--sur2);color:var(--text);font-family:'DM Sans',system-ui;font-size:14px;font-weight:600;cursor:pointer}
    .btn-sec:hover{background:var(--sur3)}
    .btn-icon{background:none;border:none;cursor:pointer;color:var(--mut);font-size:16px;padding:4px 8px}
    .btn-icon:hover{color:var(--red)}
    /* ALERTS */
    .alert{padding:14px 18px;border-radius:12px;border-left:3px solid;margin-bottom:16px;font-size:13px;line-height:1.5;color:var(--text)}
    .alert-blue{background:var(--bd);border-color:var(--blue)}
    .alert-gold{background:#1a1408;border-color:var(--gold)}
    .alert-green{background:var(--gd);border-color:var(--green)}
    .alert-orange{background:#2a1a08;border-color:var(--orange)}
    .alert-red{background:var(--rd);border-color:var(--red)}
    /* OP GRID */
    .op-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-bottom:24px}
    .op-card{background:var(--sur2);border:1.5px solid var(--bor);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s}
    .op-card:hover{transform:translateY(-2px);border-color:var(--bor2);box-shadow:0 4px 20px rgba(0,0,0,.4)}
    /* CASILLA */
    .casilla{display:inline-block;background:var(--bd);color:var(--blue);border:1px solid var(--blue);border-radius:6px;padding:1px 8px;font-size:11px;font-weight:700;font-family:monospace}
    .casilla-gold{background:#1a1408;color:var(--gold2);border-color:var(--gold)}
    /* TABLE */
    table{width:100%;border-collapse:collapse}
    th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mut);padding:8px 12px;border-bottom:1px solid var(--bor);text-align:left}
    td{padding:11px 12px;border-bottom:1px solid var(--bor);font-size:13px}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--sur2)}
    .tr-active td{background:#1a1408!important;color:var(--gold2)}
    /* RESULT BOX */
    .result-box{background:var(--sur2);border:1px solid var(--bor2);border-radius:12px;padding:20px;margin:20px 0}
    .result-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bor);font-size:14px}
    .result-row:last-child{border-bottom:none;padding-top:14px;font-size:16px;font-weight:700}
    /* GUIDE */
    .guide-item{background:var(--sur2);border:1px solid var(--bor);border-radius:12px;margin-bottom:12px;overflow:hidden}
    .guide-header{padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
    .guide-body{padding:0 20px 20px;border-top:1px solid var(--bor);font-size:13px;color:var(--dim);line-height:1.6}
    .guide-body p{margin:12px 0}
    .guide-body ul{padding-left:18px;line-height:1.8}
    /* PRIVACY BAR */
    .privacy-bar{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bor);padding:10px 24px;display:flex;align-items:center;justify-content:center;gap:16px;font-size:12px;color:var(--dim);z-index:100;flex-wrap:wrap}
    .privacy-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
    /* EMPTY */
    .empty{text-align:center;padding:60px 20px}
    .empty-icon{font-size:72px;opacity:.2;margin-bottom:16px}
    /* COLORS */
    .c-gold{color:var(--gold2)} .c-green{color:var(--green)} .c-red{color:var(--red)} .c-blue{color:var(--blue)} .c-orange{color:var(--orange)} .c-dim{color:var(--dim)}
    .fw7{font-weight:700} .ff-serif{font-family:'Playfair Display',serif}
    select{background:var(--sur2);border:1px solid var(--bor);border-radius:8px;color:var(--text);padding:5px 10px;font-size:12px;font-family:'DM Sans',system-ui;outline:none}
    a{color:var(--blue)}
    @media(max-width:640px){.form-grid,.form-grid3{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let state = { ops: [], year: "2024" };
let currentTab = "home";
let currentOpType = null;
let formData = {};
let calcResult = null;
let openGuide = null;

// ═══════════════════════════════════════════
// FISCAL DATA
// ═══════════════════════════════════════════
const BRACKETS = [
  { max:6000,    rate:0.19, label:"Hasta 6.000 €" },
  { max:50000,   rate:0.21, label:"6.000 € – 50.000 €" },
  { max:200000,  rate:0.23, label:"50.000 € – 200.000 €" },
  { max:300000,  rate:0.27, label:"200.000 € – 300.000 €" },
  { max:Infinity,rate:0.30, label:"Más de 300.000 €" },
];

const OPS = [
  {id:"compraventa",icon:"💱",name:"Compraventa",    desc:"Venta de cripto por € o fiat",            casilla:"1800",          isIncome:false},
  {id:"permuta",    icon:"🔄",name:"Permuta (Swap)", desc:"Intercambio de una cripto por otra",       casilla:"1800",          isIncome:false},
  {id:"pago",       icon:"🛒",name:"Pago con cripto",desc:"Usaste cripto para comprar algo",          casilla:"1800",          isIncome:false},
  {id:"staking",    icon:"📈",name:"Staking/Lending",desc:"Recompensas por bloquear o prestar criptos",casilla:"0033",         isIncome:true },
  {id:"airdrop",    icon:"🎁",name:"Airdrop/Hardfork",desc:"Criptos recibidas sin contraprestación",  casilla:"1626",          isIncome:true },
  {id:"mineria",    icon:"⛏️",name:"Minería",        desc:"Ingresos por minar criptomonedas",         casilla:"Act.Económica", isIncome:true, isGeneral:true},
  {id:"nft",        icon:"🖼️",name:"NFT",            desc:"Compraventa o royalties de NFTs",          casilla:"1800",          isIncome:false},
  {id:"defi",       icon:"🏦",name:"DeFi/Liquidity", desc:"Yield farming, liquidity pools",           casilla:"0033/1800",     isIncome:true },
];

const GUIDES = [
  {icon:"📋",title:"Casilla 1800 — Compraventas y Permutas",cas:"1800",
   body:"La casilla principal para el 90% de los inversores. Aquí va toda venta o intercambio de cripto. La ganancia se calcula como: Valor de transmisión − (Valor de adquisición + Comisiones). El método FIFO es obligatorio. IMPORTANTE: la permuta BTC→ETH también tributa aunque no conviertas a euros — Hacienda lo considera una venta al valor de mercado.",
   tips:["Guarda siempre los CSVs de tus exchanges con todo el historial","Las comisiones de compra y venta reducen la ganancia","Las pérdidas son compensables con ganancias hasta 4 años","Holding (comprar y no vender) NO tributa nunca en el IRPF"]},
  {icon:"💰",title:"Casilla 0033 — Staking y Lending",cas:"0033",
   body:"Las recompensas de staking tributan como Rendimiento del Capital Mobiliario según la consulta vinculante DGT V1766-22, que equipara el staking a un depósito retribuido. Tributa en el momento de recibir las recompensas, al valor de mercado en ese instante. Si después vendes esas recompensas, esa plusvalía adicional va a la casilla 1800.",
   tips:["Documenta el valor de mercado exacto al recibir cada recompensa (usa CoinGecko histórico)","Los exchanges suelen tener informes de staking descargables","Nexo, Celsius, intereses de cualquier plataforma: también aquí","Liquidity pools — los fees acumulados van a 0033"]},
  {icon:"🎁",title:"Casilla 1626 — Airdrops y Hardforks",cas:"1626",
   body:"Los airdrops son ganancias patrimoniales NO derivadas de transmisión (consultas DGT V1948-21 y V0648-24). Esto es importante porque NO se pueden compensar con las pérdidas de la casilla 1800. Se declaran al valor de mercado en el momento de recepción. Si el token no tiene precio de mercado real en ese momento, puede declararse a 0€.",
   tips:["Airdrops de tokens sin mercado = 0€ de ganancia declarable","Guarda fecha, cantidad y cotización de cada airdrop","No se compensan con pérdidas de transmisión (casilla 1800)","Los tokens de hardfork (ej. BCH al tener BTC) también van aquí"]},
  {icon:"🌍",title:"Modelo 721 — Cripto en el Extranjero",cas:"M.721",
   body:"El Modelo 721 es obligatorio si el 31 de diciembre tienes más de 50.000€ en criptomonedas custodiadas en exchanges o plataformas fuera de España. Es solo informativo — no pagas impuestos adicionales con él. El plazo es de enero a marzo del año siguiente. La sanción por no presentarlo puede ser de hasta 5.000€ por dato omitido, con un mínimo de 10.000€.",
   tips:["Binance, Coinbase, Kraken, Bybit son exchanges extranjeros","Bit2Me tiene sede en España — no requiere 721","Tus propias wallets (cold/hot wallet) NO requieren 721","Plazo: del 1 de enero al 31 de marzo del año siguiente"]},
  {icon:"⚖️",title:"Compensación de Pérdidas — Estrategia Legal",cas:"Comp.",
   body:"La compensación de pérdidas es la herramienta más poderosa para optimizar tu fiscalidad de forma 100% legal. Las pérdidas patrimoniales de transmisión (casilla 1800) se compensan con ganancias del mismo ejercicio o de los 4 años siguientes. Regla anti-elusión: si vendes con pérdida y recompras el mismo activo en los 2 meses siguientes, no puedes aplicar esa pérdida.",
   tips:["Puedes vender en pérdida en diciembre y recomprar en febrero — 100% legal","Declara siempre las pérdidas aunque no seas obligado — las 'activas' para futuros años","Lleva un Excel con tus pérdidas pendientes de compensar por ejercicio","La regla de los 2 meses se aplica al mismo tipo de cripto"]},
  {icon:"⛏️",title:"Minería — Actividad Económica",cas:"M.130",
   body:"La minería profesional o habitual tributa en la BASE GENERAL del IRPF (tipos entre 19% y 47%), no en la base del ahorro. Implica darse de alta como autónomo y presentar el Modelo 130 trimestralmente, adelantando el 20% de los beneficios cada trimestre. Gastos deducibles: hardware, electricidad, internet, software, amortizaciones del equipo.",
   tips:["Minería ocasional/no habitual puede no ser actividad económica — consulta asesor","El IVA de la minería está exento — pero esto también impide deducir el IVA soportado","Guarda TODAS las facturas de electricidad y hardware","La posterior venta de los criptos minados genera G/P patrimonial en casilla 1800"]},
];

// ═══════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════
function calcTax(gain) {
  if (gain <= 0) return 0;
  let tax = 0, remaining = gain, prev = 0;
  for (const b of BRACKETS) {
    const chunk = b.max === Infinity ? remaining : Math.min(b.max - prev, remaining);
    if (chunk <= 0) break;
    tax += chunk * b.rate;
    remaining -= chunk;
    prev = b.max;
    if (remaining <= 0) break;
  }
  return tax;
}

function fmt(v) {
  if (v === null || v === undefined || isNaN(v)) return "—";
  return new Intl.NumberFormat("es-ES", {style:"currency", currency:"EUR"}).format(v);
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }

function getSummary() {
  const gains   = state.ops.filter(o=>o.casilla==="1800"&&o.gain>0 ).reduce((s,o)=>s+o.gain, 0);
  const losses  = state.ops.filter(o=>o.casilla==="1800"&&o.gain<0 ).reduce((s,o)=>s+o.gain, 0);
  const staking = state.ops.filter(o=>o.casilla==="0033"           ).reduce((s,o)=>s+o.gain, 0);
  const airdrops= state.ops.filter(o=>o.casilla==="1626"           ).reduce((s,o)=>s+o.gain, 0);
  const base    = Math.max(gains + losses + staking + airdrops, 0);
  const tax     = calcTax(base);
  const bracket = BRACKETS.findIndex(b => base <= b.max);
  return { gains, losses, net:gains+losses, staking, airdrops, base, tax, bracket };
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  const sm = getSummary();
  document.getElementById("app").innerHTML = `
    ${renderHeader()}
    ${renderNav(sm)}
    ${currentTab==="home"   ? renderHome(sm)   : ""}
    ${currentTab==="add"    ? renderAdd()       : ""}
    ${currentTab==="report" ? renderReport(sm)  : ""}
    ${currentTab==="guide"  ? renderGuide()     : ""}
    ${renderPrivacyBar()}
  `;
  attachEvents();
}

function renderHeader() {
  return `
    <div class="header">
      <div class="logo">
        <div class="logo-icon">🛡️</div>
        <div>
          <h1>Angel Tax</h1>
          <span>Fiscalidad Cripto · España</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <select id="yearSel" onchange="changeYear(this.value)">
          <option ${state.year==="2024"?"selected":""}>2024</option>
          <option ${state.year==="2023"?"selected":""}>2023</option>
          <option ${state.year==="2022"?"selected":""}>2022</option>
        </select>
        <div class="badge">🔒 100% Local</div>
      </div>
    </div>`;
}

function renderNav(sm) {
  const tabs = [
    {id:"home",  icon:"🏠", label:"Inicio"},
    {id:"add",   icon:"➕", label:"Nueva Operación"},
    {id:"report",icon:"📄", label:"Mi Informe"},
    {id:"guide", icon:"📚", label:"Guía Fiscal"},
  ];
  return `<div class="nav">${tabs.map(t=>`
    <button onclick="goTab('${t.id}')" class="${currentTab===t.id?"active":""}">
      ${t.icon} ${t.label}
      ${t.id==="home"&&sm&&sm.base>0?`<span class="cnt">${state.ops.length}</span>`:""}
    </button>`).join("")}
  </div>`;
}

function renderHome(sm) {
  if (state.ops.length === 0) {
    return `<div class="empty">
      <div class="empty-icon">🛡️</div>
      <div class="ff-serif" style="font-size:26px;color:var(--dim);margin-bottom:8px">Bienvenido a Angel Tax</div>
      <div style="font-size:14px;color:var(--mut);max-width:380px;margin:0 auto 28px;line-height:1.7">
        Tu asesor fiscal de criptomonedas en España. Añade tus operaciones y te decimos exactamente qué casillas rellenar en la renta — gratis, sin registro, sin servidores.
      </div>
      <div class="alert alert-gold" style="max-width:460px;margin:0 auto 24px;text-align:left">
        🔒 <strong>Privacidad total:</strong> Todos tus datos se procesan únicamente en tu navegador. Ningún dato sale de tu dispositivo jamás.
      </div>
      <button class="btn-primary" onclick="goTab('add')">➕ Añadir primera operación</button>
    </div>`;
  }

  const activeBracketRate = sm.bracket >= 0 ? `${(BRACKETS[sm.bracket].rate*100).toFixed(0)}%` : "—";

  return `
    <div class="stats">
      ${[
        {l:"Base imponible",   v:fmt(sm.base),              c:"c-gold",  s:"Base del ahorro"},
        {l:"Impuesto est.",    v:fmt(sm.tax),               c:sm.tax>0?"c-red":"c-green", s:"Tipo marginal: "+activeBracketRate},
        {l:"Ganancias 1800",   v:fmt(sm.gains),             c:"c-green", s:"Transmisiones con beneficio"},
        {l:"Pérdidas 1800",    v:fmt(Math.abs(sm.losses)),  c:"c-red",   s:"Compensables hasta 4 años"},
        {l:"Staking 0033",     v:fmt(sm.staking),           c:"c-blue",  s:"Capital mobiliario"},
        {l:"Operaciones",      v:state.ops.length,          c:"c-gold",  s:"Total introducidas"},
      ].map(x=>`<div class="stat">
        <div class="stat-label">${x.l}</div>
        <div class="stat-value ${x.c}">${x.v}</div>
        <div class="stat-sub">${x.s}</div>
      </div>`).join("")}
    </div>

    ${sm.base>40000?`<div class="alert ${sm.base>50000?"alert-red":"alert-orange"}">
      ${sm.base>50000?"🚨":"⚠️"} <strong>Modelo 721:</strong>
      ${sm.base>50000
        ?"Tus operaciones superan los 50.000€. Si mantienes ese patrimonio en exchanges extranjeros a 31/12/"+state.year+", debes presentar el Modelo 721 antes del 31 de marzo."
        :"Acercándote al umbral de 50.000€ para el Modelo 721. Revisa tu saldo total a 31 de diciembre."}
    </div>`:""}

    <div class="card">
      <div class="ff-serif" style="font-size:17px;margin-bottom:16px">Tramos IRPF Base del Ahorro ${state.year}</div>
      <table>
        <thead><tr><th>Tramo</th><th>Tipo</th><th>Base aplicable</th><th>Cuota tramo</th></tr></thead>
        <tbody>
          ${BRACKETS.map((b,i)=>{
            const prev  = i===0?0:BRACKETS[i-1].max;
            const chunk = Math.max(0, Math.min(sm.base-prev, b.max===Infinity?Math.max(0,sm.base-prev):b.max-prev));
            return `<tr class="${i===sm.bracket&&sm.base>0?"tr-active":""}">
              <td>${b.label}</td>
              <td class="fw7">${(b.rate*100).toFixed(0)}%</td>
              <td>${chunk>0?fmt(chunk):"—"}</td>
              <td>${chunk>0?fmt(chunk*b.rate):"—"}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="ff-serif" style="font-size:17px;margin-bottom:16px">Operaciones — Ejercicio ${state.year}</div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Fecha</th><th>Tipo</th><th>Activo</th><th>Adquisición</th><th>Transmisión</th><th>G/P Neta</th><th>Casilla</th><th></th></tr></thead>
          <tbody>
            ${state.ops.map(op=>`
              <tr>
                <td class="c-dim" style="font-size:12px">${op.date}</td>

                <td class="fw7">${op.asset}</td>

        </table>
      </div>
    </div>`;
}

function renderAdd() {

    ${currentOpType==="staking"?`<div class="alert alert-blue">ℹ️ <strong>DGT V1766-22:</strong> Las recompensas tributan como Rendimiento del Capital Mobiliario al valor de mercado en el momento exacto de recepción.</div>`:""}
    ${currentOpType==="airdrop"?`<div class="alert alert-orange">⚠️ <strong>DGT V0648-24:</strong> Los airdrops son ganancias NO derivadas de transmisión. Si el token no tiene precio de mercado, declara a 0€.</div>`:""}
    ${currentOpType==="mineria"?`<div class="alert alert-orange">⚠️ <strong>Actividad Económica:</strong> Tributa en base general (hasta 47%). Debes presentar Modelo 130 trimestralmente adelantando el 20% de beneficios.</div>`:""}

      <div class="form-group">

        <label class="form-label">Fecha de operación</label>
        <input type="date" class="form-input" id="f-date" value="${formData.date||""}"/>

      <div class="form-group">
        <label class="form-label">Valor adquisición (€)</label>
        <input type="number" class="form-input" id="f-acq" placeholder="0.00" value="${formData.acq||""}"/>
        <div class="form-hint">Precio de compra en €</div>
      </div>
      <div class="form-group">
        <label class="form-label">Valor transmisión (€)</label>
        <input type="number" class="form-input" id="f-trans" placeholder="0.00" value="${formData.trans||""}"/>
        <div class="form-hint">${currentOpType==="permuta"?"Valor de mercado del cripto entregado":"Precio de venta en €"}</div>

      <div class="form-group">
        <label class="form-label">Comisiones (€)</label>

      <div class="form-hint">Consulta CoinGecko/CoinMarketCap histórico para el valor exacto en esa fecha</div>

    <div class="form-group">

      <input class="form-input" id="f-notes" placeholder="Exchange, número de orden, contexto..." value="${formData.notes||""}"/>

    ${!calcResult?`<button class="btn-primary" onclick="calculate()">🧮 Calcular impacto fiscal</button>`:`
      <div class="result-box">
        <div class="result-row">
          <span class="c-dim">Casilla IRPF</span>
          <span class="casilla${op.isGeneral?" casilla-gold":""}">${calcResult.cas}</span>

        <div class="result-row">

        <button class="btn-sec" onclick="clearResult()">✏️ Editar datos</button>
      </div>

  </div>`;
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function goTab(id) {
  currentTab = id;
  if (id !== "add") { currentOpType = null; formData = {}; calcResult = null; }
  render();
}

function changeYear(y) { state.year = y; render(); }

function selectOpType(id) {
  currentOpType = id;
  formData = {};
  calcResult = null;
  render();
}

function saveFormData() {
  const get = id => { const el = document.getElementById(id); return el ? el.value : ""; };
  formData.asset = get("f-asset");
  formData.date  = get("f-date");
  formData.acq   = get("f-acq");
  formData.trans = get("f-trans");
  formData.fees  = get("f-fees");
  formData.notes = get("f-notes");
}

function calculate() {
  saveFormData();
  const acq   = parseFloat(formData.acq)   || 0;
  const trans = parseFloat(formData.trans)  || 0;
  const fees  = parseFloat(formData.fees)   || 0;
  const isT   = ["compraventa","permuta","pago","nft"].includes(currentOpType);
  const gain  = isT ? trans - acq - fees : trans;
  const cas   = currentOpType==="staking"||currentOpType==="defi" ? "0033"
              : currentOpType==="airdrop" ? "1626"
              : currentOpType==="mineria" ? "Act.Económica"
              : "1800";
  calcResult = { gain, cas, tax: calcTax(Math.max(gain,0)) };
  render();
}

function clearResult() { calcResult = null; render(); }

function addOperation() {
  if (!calcResult) return;
  const op = OPS.find(o=>o.id===currentOpType);
  state.ops.push({
    id: genId(), type: currentOpType, typeName: op.name,
    asset: formData.asset||"—", date: formData.date||"—",
    acq: parseFloat(formData.acq)||0, trans: parseFloat(formData.trans)||0,
    fees: parseFloat(formData.fees)||0, gain: calcResult.gain, casilla: calcResult.cas,
    notes: formData.notes||""
  });
  currentOpType = null; formData = {}; calcResult = null;
  goTab("home");
}

function deleteOp(id) {
  state.ops = state.ops.filter(o=>o.id!==id);
  render();
}

function toggleGuide(i) {
  openGuide = openGuide === i ? null : i;
  render();
}

function downloadReport() {
  const sm = getSummary();
  const lines = [
    "ANGEL TAX — INFORME FISCAL CRIPTO " + state.year,
    "Generado: " + new Date().toLocaleDateString("es-ES"),
    "=".repeat(50), "",
    "BASE IMPONIBLE TOTAL:  " + fmt(sm.base),
    "IMPUESTO ESTIMADO:     " + fmt(sm.tax),
    "Ganancias (1800):      " + fmt(sm.gains),
    "Pérdidas  (1800):      " + fmt(sm.losses),
    "Staking   (0033):      " + fmt(sm.staking),
    "Airdrops  (1626):      " + fmt(sm.airdrops), "",
    "-".repeat(50), "OPERACIONES DETALLADAS:", "-".repeat(50),
    ...state.ops.map(o=>`${o.date} | ${o.typeName} | ${o.asset} | ${o.gain>=0?"+":""}${fmt(o.gain)} | Casilla ${o.casilla}`),
    "", "DISCLAIMER: Herramienta orientativa. Consulta siempre un asesor fiscal certificado.",
    "Open Source: https://github.com/kaizenbnb/Angel-TAX"
  ];
  const blob = new Blob([lines.join("\n")], {type:"text/plain;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `AngelTax_Informe_${state.year}.txt`;
  a.click();
}

function attachEvents() {
  // Keep form data live as user types (no re-render on each keystroke)
  ["f-asset","f-date","f-acq","f-trans","f-fees","f-notes"].forEach(id=>{
    const el = document.getElementById(id);
    if (el) el.addEventListener("change", ()=>saveFormData());
  });
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
render();
</script>
