name: CI — Self-Check Golden Cases

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selfcheck:
    name: Run selfCheck() golden cases (PR-07)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer and serve
        run: npm install --no-save puppeteer@22 serve

      - name: Run selfCheck() via headless browser
        run: |
          npx serve . -l 8080 &
          sleep 4
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-gpu']
            });
            const page = await browser.newPage();
            await page.goto('http://localhost:8080', { waitUntil: 'networkidle2', timeout: 30000 });

            // selfCheck() opens a modal — call it and read the DOM results
            await page.evaluate(() => selfCheck());
            await page.waitForTimeout(500);

            const results = await page.evaluate(() => {
              const rows = document.querySelectorAll('table tr, .check-row, [data-test]');
              if (!rows.length) {
                // Try reading the modal text for PASS/FAIL info
                const body = document.body.innerText;
                const passed = (body.match(/PASSED/gi) || []).length;
                const failed = (body.match(/FAILED/gi) || []).length;
                const allPass = body.includes('ALL PASS');
                return { passed, failed, allPass, raw: body.substring(body.indexOf('Self-Check'), body.indexOf('Self-Check') + 300) };
              }
              return { rows: rows.length };
            });

            console.log('Results:', JSON.stringify(results));
            await browser.close();

            const passed = results.passed || 0;
            const failed = results.failed || 0;
            const allPass = results.allPass;

            if (!allPass || failed > 0) {
              console.error('FAILED: ' + failed + ' test(s) failed');
              process.exit(1);
            }
            console.log('ALL PASS (' + passed + ' tests)');
          })().catch(e => { console.error(e); process.exit(1); });
          "
