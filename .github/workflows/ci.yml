name: CI — Self-Check Golden Cases

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selfcheck:
    name: Run selfCheck() golden cases (PR-07)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer and serve
        run: npm install --no-save puppeteer@22 serve

      - name: Run selfCheck() via headless browser
        run: |
          npx serve . -l 8080 &
          sleep 4
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-gpu']
            });
            const page = await browser.newPage();
            await page.goto('http://localhost:8080', { waitUntil: 'networkidle2', timeout: 30000 });

            // selfCheck() opens a modal with results
            await page.evaluate(() => selfCheck());
            // Wait for modal to render (replace deprecated waitForTimeout)
            await new Promise(r => setTimeout(r, 800));

            const results = await page.evaluate(() => {
              const body = document.body.innerText;
              const allPass = body.includes('ALL PASS');
              const failedMatch = body.match(/(\d+)\s*FAILED/);
              const passedMatch = body.match(/(\d+)\s*PASSED/);
              return {
                allPass,
                failed: failedMatch ? parseInt(failedMatch[1]) : -1,
                passed: passedMatch ? parseInt(passedMatch[1]) : 0
              };
            });

            console.log('Results:', JSON.stringify(results));
            await browser.close();

            if (!results.allPass || results.failed > 0) {
              console.error('FAILED: ' + results.failed + ' test(s) failed');
              process.exit(1);
            }
            console.log('ALL PASS (' + results.passed + '/10 tests)');
          })().catch(e => { console.error(e); process.exit(1); });
          "
