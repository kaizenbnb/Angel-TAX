<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <filter id="shadowFilter">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Left wing -->
  <path d="M 80 200 L 120 160 L 140 180 L 160 150 L 180 170 L 160 190 L 140 210 Z" 
        fill="url(#goldGradient)" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Central shield -->
  <g filter="url(#shadowFilter)">
    <!-- Shield outline -->
    <path d="M 256 80 L 320 140 L 320 280 Q 320 380 256 420 Q 192 380 192 280 L 192 140 Z" 
          fill="white" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- Shield inner -->
    <path d="M 256 100 L 310 150 L 310 280 Q 310 360 256 400 Q 202 360 202 280 L 202 150 Z" 
          fill="url(#goldGradient)" stroke="none"/>
    
    <!-- Bitcoin symbol -->
    <text x="230" y="220" font-size="60" font-weight="bold" fill="#1a1a1a" font-family="Arial">₿</text>
    
    <!-- Euro symbol -->
    <text x="280" y="220" font-size="60" font-weight="bold" fill="#1a1a1a" font-family="Arial">€</text>
    
    <!-- Grid pattern at bottom -->
    <rect x="200" y="320" width="12" height="12" fill="#1a1a1a" opacity="0.8"/>
    <rect x="220" y="320" width="12" height="12" fill="#1a1a1a" opacity="0.8"/>
    <rect x="240" y="320" width="12" height="12" fill="#1a1a1a" opacity="0.8"/>
    <rect x="260" y="320" width="12" height="12" fill="#1a1a1a" opacity="0.8"/>
    <rect x="280" y="320" width="12" height="12" fill="#1a1a1a" opacity="0.8"/>
    <rect x="300" y="320" width="12" height="12" fill="#1a1a1a" opacity="0.8"/>
    
    <rect x="200" y="340" width="12" height="12" fill="#1a1a1a" opacity="0.8"/>
    <rect x="220" y="340" width="12" height="12" fill="#1a1a1a" opacity="0.8"/>
    <rect x="240" y="340" width="12" height="12" fill="#1a1a1a" opacity="0.8"/>
    <rect x="260" y="340" width="12" height="12" fill="#1a1a1a" opacity="0.8"/>
    <rect x="280" y="340" width="12" height="12" fill="#1a1a1a" opacity="0.8"/>
    <rect x="300" y="340" width="12" height="12" fill="#1a1a1a" opacity="0.8"/>
  </g>
  
  <!-- Right wing -->
  <path d="M 432 200 L 392 160 L 372 180 L 352 150 L 332 170 L 352 190 L 372 210 Z" 
        fill="url(#goldGradient)" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Decorative lines connecting wings to shield -->
  <path d="M 180 180 Q 200 140 230 120" stroke="#FFD700" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 332 180 Q 312 140 282 120" stroke="#FFD700" stroke-width="2" fill="none" opacity="0.6"/>
</svg>